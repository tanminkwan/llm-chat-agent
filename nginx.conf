worker_processes auto;
events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # 스트리밍(SSE) 최적화: 버퍼링 비활성화
    proxy_buffering off;
    proxy_cache off;
    chunked_transfer_encoding on;

    # ─────────────────────────────────────────────────────────────
    # llm-agent.mwm.local : 앱 본체
    # ─────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name llm-agent.mwm.local;

        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        # 호스트 매핑 포트(:21443) 가 nginx 자동 redirect 의 absolute Location 에서
        # 누락되는 것을 방지. 상대 Location 으로 강제하여 브라우저가 원래 요청한
        # scheme/host/port 를 그대로 유지하도록 한다.
        absolute_redirect off;

        location / {
            proxy_pass http://llm-agent:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 캐시 방지
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            add_header Last-Modified $date_gmt;
            if_modified_since off;
            expires off;
            etag off;

            # WebSocket 및 SSE 지원
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }

    # ─────────────────────────────────────────────────────────────
    # grafana.mwm.local : 별도 vhost 로 root path 에서 Grafana 노출
    #   - sub-path (/grafana) 사용 안 함, GF_SERVER_SERVE_FROM_SUB_PATH=false
    #   - SNI 로 같은 :443 에서 라우팅, cert 의 SAN 에 두 호스트 모두 포함
    # ─────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name grafana.mwm.local;

        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        absolute_redirect off;

        location / {
            proxy_pass http://grafana:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Grafana Live (websocket / SSE) 지원
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
