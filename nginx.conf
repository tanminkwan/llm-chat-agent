worker_processes auto;
events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # 스트리밍(SSE) 최적화: 버퍼링 비활성화
    proxy_buffering off;
    proxy_cache off;
    chunked_transfer_encoding on;

    server {
        listen 443 ssl;
        server_name llm-agent.mwm.local;

        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        # Phase 06: Grafana sub-path 리버스 프록시
        location /grafana/ {
            proxy_pass http://grafana:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Grafana Live (websocket) 지원
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Grafana Live SSE/WS 전용 엔드포인트
        location /grafana/api/live/ {
            proxy_pass http://grafana:3000/api/live/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        location / {
            proxy_pass http://llm-agent:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 캐시 방지 설정 추가
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            add_header Last-Modified $date_gmt;
            if_modified_since off;
            expires off;
            etag off;

            # WebSocket 및 SSE 지원
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }

}
