<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지식 관리 콘솔 - AI 에이전트</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        /* RAG 전용 추가 스타일 */
        .content-area {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            background: var(--bg-color);
        }
        .search-panel {
            background: rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            align-items: flex-end;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex: 1;
        }
        .form-group label {
            font-size: 0.85rem;
            color: #94a3b8;
        }
        .form-group select, .form-group input {
            background: #1e293b;
            border: 1px solid #334155;
            color: white;
            padding: 0.6rem;
            border-radius: 6px;
        }
        .btn-primary {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            overflow: hidden;
        }
        .data-table th, .data-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .data-table th {
            background: rgba(255, 255, 255, 0.05);
            color: #94a3b8;
            font-weight: 500;
        }
        .action-btns {
            display: flex;
            gap: 0.5rem;
        }
        .badge-type {
            background: #334155;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <div id="app" style="display: flex; height: 100vh;">
        <!-- 사이드바 (index.html과 동일 스타일) -->
        <div id="sidebar">
            <div class="logo">AI 에이전트</div>
            <div class="nav-menu">
                <div class="nav-item" onclick="location.href='/'">💬 일반 대화</div>
                <div class="nav-item active" onclick="location.href='/static/rag.html'">📚 지식 관리</div>
            </div>
            <div class="user-profile" id="user-info">
                <div id="username">Loading...</div>
                <div id="role-badge" class="admin-badge">User</div>
                <a href="/auth/logout" style="color: var(--accent-color); font-size: 0.75rem;">로그아웃</a>
            </div>
        </div>

        <!-- 메인 콘텐츠 영역 -->
        <div class="content-area">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h2>RAG 지식 통합 관리</h2>
                <div>
                    <button class="btn-primary" onclick="showForm('collection')">+ 새 콜렉션(유형)</button>
                    <button class="btn-primary" style="background: #334155;" onclick="showForm('domain')">+ 새 도메인(분야)</button>
                </div>
            </div>

            <!-- 검색 필터 패널 -->
            <div class="search-panel">
                <div class="form-group" style="flex: 1.5;">
                    <label>콜렉션 ID (Table Name)</label>
                    <input type="text" id="search-collection-id" placeholder="ID 직접 입력...">
                </div>
                <div class="form-group">
                    <label>RAG 유형 (선택)</label>
                    <select id="filter-collection">
                        <option value="">전체 유형</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>지식 분야 (Domain)</label>
                    <select id="filter-domain">
                        <option value="">전체 분야</option>
                    </select>
                </div>
                <div class="form-group" style="flex: 2;">
                    <label>지식 검색 (Query)</label>
                    <input type="text" id="search-query" placeholder="검색어를 입력하세요...">
                </div>
                <button class="btn-primary" onclick="performSearch()">검색 실행</button>
            </div>

            <!-- 데이터 리스트 테이블 -->
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>유형(Table)</th>
                            <th>표시 명칭</th>
                            <th>검색 방식</th>
                            <th>설명</th>
                            <th>관리</th>
                        </tr>
                    </thead>
                    <tbody id="collection-list">
                        <!-- 데이터 동적 로드 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 등록/수정 레이어 (Slide-over 모달) -->
    <div id="form-modal" class="modal" style="display: none;">
        <div class="modal-content" style="max-width: 500px;">
            <h3 id="modal-title">새 콜렉션 등록</h3>
            <form id="rag-form" onsubmit="saveData(event)">
                <div id="collection-fields">
                    <div class="form-group" style="margin-bottom: 1rem;">
                        <label>콜렉션 명 (Qdrant ID - 수정불가)</label>
                        <input type="text" id="field-collection-name" required placeholder="e.g., qna_docs">
                    </div>
                    <div class="form-group" style="margin-bottom: 1rem;">
                        <label>표시 이름</label>
                        <input type="text" id="field-name" required placeholder="e.g., Q&A 지식베이스">
                    </div>
                    <div class="form-group" style="margin-bottom: 1rem;">
                        <label>검색 방식</label>
                        <select id="field-search-method">
                            <option value="vector">Vector Distance (Semantic)</option>
                            <option value="bm25">BM25 (Keyword)</option>
                        </select>
                    </div>
                </div>
                <div id="domain-fields" style="display: none;">
                    <div class="form-group" style="margin-bottom: 1rem;">
                        <label>도메인(분야) 명칭</label>
                        <input type="text" id="field-domain-name" placeholder="e.g., 의학, 경제">
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" onclick="closeModal()">취소</button>
                    <button type="submit" class="btn-primary">저장하기</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/js/rag.js"></script>
</body>
</html>
