<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">권한 없음</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f1f5f9;
            --accent-color: #ef4444;
            --secondary-color: #94a3b8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--card-bg);
            padding: 3rem;
            border-radius: 1rem;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 90%;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .icon {
            font-size: 4rem;
            color: var(--accent-color);
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }

        p {
            color: var(--secondary-color);
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .btn {
            background-color: transparent;
            color: var(--text-color);
            border: 1px solid var(--secondary-color);
            padding: 0.8rem 1.5rem;
            border-radius: 0.5rem;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
        }

        .btn:hover {
            background-color: rgba(255,255,255,0.1);
            border-color: var(--text-color);
        }

        .contact-box {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 0.9rem;
            color: var(--secondary-color);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">⚠️</div>
        <h1>접근 권한이 없습니다</h1>
        <p id="error-msg">
            죄송합니다. 현재 계정에는 이 서비스를 사용할 수 있는 적절한 권한이 할당되어 있지 않습니다.
        </p>
        <div class="contact-box" id="contact-info">
            문의사항이 있으시면 <strong>관리자</strong>에게 권한 할당을 요청하시기 바랍니다.
        </div>
    </div>

    <script>
        async function loadConfig() {
            try {
                const response = await fetch('/api/config');
                if (response.ok) {
                    const config = await response.json();
                    const appTitle = config.app_name + " 서비스";
                    document.title = "권한 없음 - " + appTitle;
                    document.getElementById('error-msg').innerText = `죄송합니다. 현재 계정에는 ${appTitle}를 사용할 수 있는 적절한 권한이 할당되어 있지 않습니다.`;
                    document.getElementById('contact-info').innerHTML = `문의사항이 있으시면 <strong>${config.app_name} 관리자</strong>에게 권한 할당을 요청하시기 바랍니다.`;
                }
            } catch (err) {
                console.error('설정을 불러오는데 실패했습니다:', err);
            }
        }
        window.onload = loadConfig;
    </script>
</body>
</html>
