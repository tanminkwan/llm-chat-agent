server:
  http_listen_port: 9080
  grpc_listen_port: 0

clients:
  - url: http://loki:3100/loki/api/v1/push

positions:
  filename: /tmp/positions.yaml

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Docker 컨테이너 이름 → 라벨 container
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: stream

    pipeline_stages:
      # Docker JSON-file driver: {"log":"...","stream":"stdout","time":"..."}
      - json:
          expressions:
            output: log
            stream: stream
            time:   time
      - timestamp:
          source: time
          format: RFC3339Nano
      - output:
          source: output

      # llm-agent 컨테이너에 한해 [LLM_LOG] JSON 본문 추출 + 라벨링
      - match:
          selector: '{container="llm-agent"}'
          stages:
            - regex:
                expression: '\[LLM_LOG\]\s+(?P<llm_json>\{.*\})'
            - json:
                source: llm_json
                expressions:
                  type: type
                  model_type: model_type
                  request_id: request_id
                  thread_id: thread_id
                  user_id: user_id
                  model: model
                  search_method: search_method
            # 저카디널리티 라벨 (Loki 인덱스)
            - labels:
                type:
                model_type:
                search_method:
            # 고카디널리티 식별자는 structured metadata 로 (Loki 3.x)
            - structured_metadata:
                request_id:
                thread_id:
                user_id:
                model:
