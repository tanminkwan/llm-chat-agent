; Phase 06 — 보조 설정. 대부분의 항목은 docker-compose 의 GF_* 환경변수로 주입된다.

[server]
domain = localhost
serve_from_sub_path = true

[dashboards]
; default home dashboard 를 minimal home.json 으로 교체 — 환영 배너/setup steps 숨김
default_home_dashboard_path = /etc/grafana/home.json

[news]
; right-side news feed 숨김
news_feed_enabled = false

[security]
; nginx HTTPS 종단을 통과하므로 dev/prod 공통 true
cookie_secure = true
cookie_samesite = lax
disable_initial_admin_creation = false

[users]
allow_sign_up = false

[analytics]
reporting_enabled = false
check_for_updates = false
