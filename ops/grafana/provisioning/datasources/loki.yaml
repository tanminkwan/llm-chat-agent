apiVersion: 1

datasources:
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    jsonData:
      maxLines: 5000
      derivedFields:
        - matcherType: label
          matcherRegex: request_id
          name: trace_admin
          url: '$GF_SERVER_ROOT_URL/d/llm-user-drilldown?var-user_id=$${user_id}&var-request_id=$${__value.raw}&$${__url_time_range}'
          urlDisplayLabel: 'Admin drilldown 으로 trace 보기'
        - matcherType: label
          matcherRegex: request_id
          name: trace_my
          url: '$GF_SERVER_ROOT_URL/d/llm-my-usage?var-request_id=$${__value.raw}&$${__url_time_range}'
          urlDisplayLabel: '내 LLM 사용 현황 에서 trace 보기'
