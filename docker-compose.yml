services:
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "21443:443" # 호스트의 21443 포트를 443으로 전달
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - llm-agent
    extra_hosts:
      - "idp.mwm.local:host-gateway"
      - "llm-agent.mwm.local:host-gateway"
      - "host.docker.internal:host-gateway"
    restart: always

  llm-agent:
    image: llm-agent:latest
    container_name: llm-agent
    ports:
      - "28000:8000" # 외부 Nginx가 접근할 수 있도록 포트 노출 (8000 충돌 시 28000 등 미사용 포트 지정)
    env_file:
      - .env
    extra_hosts:
      - "idp.mwm.local:host-gateway"
      - "llm-agent.mwm.local:host-gateway"
      - "host.docker.internal:host-gateway"
    depends_on:
      - qdrant
    restart: always

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_data:/qdrant/storage
    restart: always

networks:
  default:
    name: llm-network
